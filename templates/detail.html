{% load static %}

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title|default:"Post" }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.7; }
        h1 { color: #333; }
        .error { color: red; background: #ffebee; padding: 10px; }
    </style>
</head>
<body>

    <h1>{{ post.title }}</h1>

    <p><strong>Sana:</strong> {{ post.publish|date:"d.m.Y H:i" }}</p>
    <p><strong>Muallif:</strong> {{ post.author }}</p>

    <hr>

    <div>
        {{ post.body|linebreaks }}
    </div>

    <hr>
    <a href="/">← Bosh sahifaga qaytish</a>

    <!-- Debug uchun -->
    <hr>
    <h3>Debug Info:</h3>
    <p>Post ID: {{ post.id }}</p>
    <p>Slug: {{ post.slug }}</p>

</body>
</html>
